<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #f6efe9;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    padding: 30px 0;
}

/* Wrapper */
.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Invite Image */
.invite {
    width: 420px;
    background: white;
    padding: 10px;
    border-radius: 12px;
}

.invite img {
    width: 100%;
    border-radius: 8px;
    display: block;
}

/* Registry */
.registry {
    width: 420px;
    background: white;
    padding: 25px;
    margin-top: 20px;
    border-radius: 12px;
    text-align: center;
}

.registry h2 {
    margin: 0;
    font-size: 20px;
}

.registry p {
    font-size: 14px;
    margin: 10px 0 20px;
}

.registry a {
    display: inline-block;
    padding: 12px 20px;
    background: #b07a7a;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}

/* Mobile */
@media (max-width: 480px) {
    .invite, .registry {
        width: 90%;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- INVITE IMAGE -->
    <div class="invite">
        <img src="invite.png" alt="Baby Shower Invite">
    </div>

    <!-- REGISTRY -->
    <div class="registry">
        <h2>Baby Registry 🎁</h2>

        <p>
            Your presence is the greatest gift 💕<br>
            But if you'd like, you can view our registry below.
        </p>

        <a href="PUT-YOUR-LINK-HERE" target="_blank">
            View Registry
        </a>
    </div>

</div>

</body>
</html>
