<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baby Shower</title>

<style>
body {
    margin: 0;
    background: #f6efe9;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* INVITE IMAGE */
.invite-img {
    width: 95%;
    max-width: 520px;
    margin-top: 20px;
    border-radius: 8px;
}

/* REGISTRY BOX */
.registry-box {
    width: 95%;
    max-width: 520px;
    margin-top: 20px;
    background: #f3e6e3; /* soft pink tone */
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* TEXT */
.registry-text {
    font-size: 14px;
    color: #444;
    line-height: 1.6;
}

/* BUTTON */
.registry-btn {
    display: inline-block;
    margin-top: 12px;
    padding: 12px 18px;
    background: #c58a8a;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.registry-btn:hover {
    background: #b07a7a;
}
</style>
</head>

<body>

<!-- INVITE IMAGE -->
<img src="invite.png" class="invite-img">

<!-- REGISTRY BOX -->
<div class="registry-box">
    <div class="registry-text">
        Your presence is the greatest gift of all 💕<br>
        Should you wish, our registry is available below.
    </div>

    <a href="https://my.babylist.com/shana-lea-post" target="_blank" class="registry-btn">
        View Registry 🎁
    </a>
</div>

</body>
</html>
