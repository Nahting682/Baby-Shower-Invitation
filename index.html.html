<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baby Shower</title>

<style>
body {
    margin: 0;
    background: #f6efe9;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* IMAGE */
.invite-img {
    width: 95%;
    max-width: 520px;
    margin-top: 20px;
    border-radius: 8px;
}

/* REGISTRY SECTION */
.registry {
    margin-top: 50px;
    text-align: center;
    max-width: 400px;
    padding: 0 20px;
    line-height: 1.6;
}

.registry-text {
    font-size: 14px;
    color: #444;
}

/* BUTTON */
.registry-btn {
    display: inline-block;
    margin-top: 12px;
    padding: 12px 18px;
    background: #d8b4b4;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
}

/* MOBILE */
@media (max-width: 500px) {
    .invite-img {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- 🔥 YOUR INVITE IMAGE -->
<img src="invite.png" class="invite-img">

<!-- 🎁 REGISTRY -->
<div class="registry">
    <div class="registry-text">
        Your presence is the greatest gift of all 💕<br>
        Should you wish, our registry is available below.
    </div>

    <a href="https://my.babylist.com/shana-lea-post" target="_blank" class="registry-btn">
        View Registry 🎁
    </a>
</div>

</body>
</html>
